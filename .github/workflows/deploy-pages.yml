name: Deploy VJ SYSTEM to GitHub Pages

# Builds the gallery (site root) and the standalone LUMEN app (under /lumen/) and
# publishes them together to GitHub Pages.
# One-time setup in the repo: Settings -> Pages -> Source = "GitHub Actions".
# (Private repos need a paid plan for Pages, otherwise make the repo public.)

on:
  push:
    branches:
      - main
      - claude/vj-system-monorepo-puv6dy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # base must match the Pages path: https://<owner>.github.io/<repo>/
      - name: Build gallery (site root)
        run: npm run build -w gallery -- --base "/${{ github.event.repository.name }}/"

      - name: Build LUMEN (/lumen/)
        run: npm run build -w lumen -- --base "/${{ github.event.repository.name }}/lumen/"

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site/lumen
          cp -r apps/gallery/dist/* _site/
          cp -r apps/lumen/dist/* _site/lumen/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
