name: Deploy LUMEN to GitHub Pages

# Builds the apps/lumen Vite+ app and publishes it to GitHub Pages.
# One-time setup in the repo: Settings -> Pages -> Source = "GitHub Actions".
# (Private repos need a paid plan for Pages, otherwise make the repo public.)

on:
  push:
    branches:
      - main
      - claude/vj-system-monorepo-puv6dy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build LUMEN
        # base must match the Pages path: https://<owner>.github.io/<repo>/
        run: npm run build -w lumen -- --base "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/lumen/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
