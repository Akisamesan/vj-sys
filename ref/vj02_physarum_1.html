<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VJ 02 — PHYSARUM</title>
    <style>
      :root {
        --accent: #b6ff5e;
        --dim: rgba(255, 255, 255, 0.45);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
        color: #fff;
      }
      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: rgba(0, 0, 0, 0.82);
        z-index: 10;
        text-align: center;
        padding: 24px;
      }
      #overlay h1 {
        font-size: clamp(22px, 4vw, 40px);
        font-weight: 700;
        letter-spacing: 0.35em;
      }
      #overlay h1 span {
        color: var(--accent);
      }
      #overlay p {
        color: var(--dim);
        font-size: 12px;
        line-height: 1.9;
        max-width: 46em;
      }
      .btns {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        font: inherit;
        font-size: 13px;
        letter-spacing: 0.15em;
        padding: 13px 26px;
        cursor: pointer;
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.4);
        transition: 0.2s;
      }
      button:hover,
      button:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: none;
      }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 5;
        font-size: 11px;
        line-height: 1.9;
        letter-spacing: 0.08em;
        pointer-events: none;
        transition: opacity 0.6s;
        mix-blend-mode: difference;
      }
      #hud .t {
        color: var(--accent);
        letter-spacing: 0.25em;
        margin-bottom: 4px;
      }
      #hud .k {
        color: var(--dim);
      }
      #err {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: #000;
        z-index: 20;
        color: #f66;
        font-size: 13px;
        padding: 24px;
        text-align: center;
        line-height: 2;
      }
      .hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="gl"></canvas>

    <div id="hud" class="hidden">
      <div class="t">02 PHYSARUM</div>
      <div>
        <span class="k">BPM</span> <span id="hBpm">--</span> &nbsp;<span class="k">AGENTS</span>
        <span id="hAg">262144</span> &nbsp;<span class="k">MODE</span> <span id="hMode">0</span>
      </div>
      <div><span class="k">CHG</span> <span id="hChg">0.00</span></div>
      <div class="k">[S] mode&nbsp; [R] reset&nbsp; [F] fullscreen&nbsp; [H] hud</div>
    </div>

    <div id="overlay">
      <h1>02 <span>PHYSARUM</span></h1>
      <p>
        26万エージェントの粘菌シミュレーション。低域が移動速度とフェロモン分泌量、<br />
        高域がセンサー角を変調し、キックでエージェントが散乱、noveltyで挙動レジームが切替わります。<br /><br />
        ※ マイクがブロックされる環境では「デモ音源」を使ってください。
      </p>
      <div class="btns">
        <button id="bMic">マイク入力で開始</button>
        <button id="bDemo">デモ音源で開始</button>
      </div>
    </div>

    <div id="err"><div id="errMsg">WebGL2 を初期化できませんでした。</div></div>

    <script>
      "use strict";
      /* ================= AUDIO ENGINE(共通) ================= */
      class AudioEngine {
        constructor() {
          this.ctx = null;
          this.an = null;
          this.freq = null;
          this.prevF = null;
          this.running = false;
          this.bass = 0;
          this.mid = 0;
          this.high = 0;
          this.bassSlow = 0;
          this.fluxF = 0;
          this.fluxS = 1e-4;
          this.novelty = 1;
          this.change = 0.1;
          this.centroid = 0.3;
          this.beat = 0;
          this.beatPulse = 0;
          this.lastBeat = -1;
          this.intervals = [];
          this.bpm = 0;
        }
        async initMic() {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          const st = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false,
            },
          });
          this._setup(this.ctx.createMediaStreamSource(st), false);
        }
        initDemo() {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.demo = new DemoLoop(this.ctx);
          this._setup(this.demo.out, true);
          this.demo.start();
        }
        _setup(src, toDest) {
          this.an = this.ctx.createAnalyser();
          this.an.fftSize = 2048;
          this.an.smoothingTimeConstant = 0.5;
          src.connect(this.an);
          if (toDest) this.an.connect(this.ctx.destination);
          this.freq = new Uint8Array(this.an.frequencyBinCount);
          this.prevF = new Uint8Array(this.an.frequencyBinCount);
          this.running = true;
        }
        update(dt) {
          if (!this.running) return;
          this.prevF.set(this.freq);
          this.an.getByteFrequencyData(this.freq);
          const n = this.freq.length,
            binHz = this.ctx.sampleRate / 2 / n;
          const bTo = Math.max(3, Math.round(160 / binHz)),
            mTo = Math.round(2200 / binHz);
          let b = 0,
            m = 0,
            h = 0,
            flux = 0,
            cw = 0,
            cs = 0;
          for (let i = 1; i < n; i++) {
            const v = this.freq[i] / 255;
            if (i < bTo) b += v;
            else if (i < mTo) m += v;
            else h += v;
            const d = (this.freq[i] - this.prevF[i]) / 255;
            if (d > 0) flux += d;
            cw += v * i;
            cs += v;
          }
          b /= bTo;
          m /= mTo - bTo;
          h /= n - mTo;
          flux /= n * 0.05;
          const k = 1 - Math.exp(-dt * 12);
          this.bass += (b - this.bass) * k;
          this.mid += (m - this.mid) * k;
          this.high += (h - this.high) * k;
          this.centroid += ((cs > 1e-3 ? cw / cs / n : 0.3) - this.centroid) * k * 0.5;
          this.fluxF += (flux - this.fluxF) * (1 - Math.exp(-dt * 8));
          this.fluxS += (flux - this.fluxS) * (1 - Math.exp(-dt * 0.35));
          this.novelty = this.fluxF / Math.max(this.fluxS, 1e-4);
          this.change = Math.min(1, Math.max(0.06, (this.novelty - 0.8) * 0.8));
          this.bassSlow += (b - this.bassSlow) * (1 - Math.exp(-dt * 1.2));
          const t = this.ctx.currentTime;
          this.beat = 0;
          if (b > this.bassSlow * 1.32 + 0.04 && t - this.lastBeat > 0.27) {
            const iv = t - this.lastBeat;
            this.beat = 1;
            this.beatPulse = 1;
            this.lastBeat = t;
            if (iv > 0.27 && iv < 1.6) {
              this.intervals.push(iv);
              if (this.intervals.length > 10) this.intervals.shift();
              const s = [...this.intervals].sort((a, c) => a - c);
              this.bpm = Math.round(60 / s[s.length >> 1]);
            }
          }
          this.beatPulse *= Math.exp(-dt * 5.5);
        }
      }
      class DemoLoop {
        constructor(ctx) {
          this.ctx = ctx;
          this.out = ctx.createGain();
          this.out.gain.value = 0.9;
          this.bpm = 126;
          this.step = 0;
          this.next = 0;
          this.bar = 0;
          this.section = 0;
        }
        start() {
          this.next = this.ctx.currentTime + 0.1;
          this.timer = setInterval(() => this._sched(), 25);
        }
        _sched() {
          const spb = 60 / this.bpm / 4;
          while (this.next < this.ctx.currentTime + 0.12) {
            this._play(this.step % 16, this.next);
            this.step++;
            if (this.step % 16 === 0) {
              this.bar++;
              if (this.bar % 8 === 0) this.section = (this.section + 1) % 4;
            }
            this.next += spb;
          }
        }
        _play(s, t) {
          const sec = this.section;
          if (sec !== 3 && s % 4 === 0) this.kick(t);
          if (sec >= 1 && s % 2 === 1) this.hat(t, 0.12);
          if (sec === 2 && s % 2 === 0) this.hat(t, 0.05);
          if (sec === 2 && (s === 4 || s === 12)) this.clap(t);
          const notes = [55, 55, 0, 55, 0, 55, 0, 82.4, 55, 0, 55, 55, 0, 65.4, 0, 49];
          if (sec !== 3 && notes[s]) this.bass(t, notes[s], sec === 2 ? 1500 : 520);
          if (sec === 3 && s === 0) this.pad(t);
        }
        kick(t) {
          const o = this.ctx.createOscillator(),
            g = this.ctx.createGain();
          o.frequency.setValueAtTime(160, t);
          o.frequency.exponentialRampToValueAtTime(42, t + 0.11);
          g.gain.setValueAtTime(1, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
          o.connect(g);
          g.connect(this.out);
          o.start(t);
          o.stop(t + 0.3);
        }
        _nbuf() {
          if (!this._nb) {
            const b = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.3, this.ctx.sampleRate);
            const d = b.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            this._nb = b;
          }
          return this._nb;
        }
        hat(t, dec) {
          const s = this.ctx.createBufferSource();
          s.buffer = this._nbuf();
          const f = this.ctx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 7500;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.22, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + dec);
          s.connect(f);
          f.connect(g);
          g.connect(this.out);
          s.start(t);
          s.stop(t + dec + 0.02);
        }
        clap(t) {
          const s = this.ctx.createBufferSource();
          s.buffer = this._nbuf();
          const f = this.ctx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 1600;
          f.Q.value = 1.2;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.5, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
          s.connect(f);
          f.connect(g);
          g.connect(this.out);
          s.start(t);
          s.stop(t + 0.2);
        }
        bass(t, fq, cut) {
          const o = this.ctx.createOscillator();
          o.type = "sawtooth";
          o.frequency.value = fq;
          const f = this.ctx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = cut;
          f.Q.value = 6;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.21);
          o.connect(f);
          f.connect(g);
          g.connect(this.out);
          o.start(t);
          o.stop(t + 0.24);
        }
        pad(t) {
          [220, 277.2, 329.6].forEach((fq, i) => {
            const o = this.ctx.createOscillator();
            o.type = "sawtooth";
            o.frequency.value = fq * (i === 1 ? 1.004 : 1);
            const f = this.ctx.createBiquadFilter();
            f.type = "lowpass";
            f.frequency.setValueAtTime(380, t);
            f.frequency.linearRampToValueAtTime(2300, t + 3.4);
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.12, t + 0.6);
            g.gain.linearRampToValueAtTime(0, t + 3.7);
            o.connect(f);
            f.connect(g);
            g.connect(this.out);
            o.start(t);
            o.stop(t + 3.8);
          });
        }
      }

      /* ================= GL ================= */
      const cv = document.getElementById("gl");
      const gl = cv.getContext("webgl2", { antialias: false, alpha: false });
      function fail(msg) {
        const e = document.getElementById("err");
        document.getElementById("errMsg").textContent = msg;
        e.style.display = "grid";
        throw new Error(msg);
      }
      if (!gl) fail("WebGL2 を初期化できませんでした。");
      if (!gl.getExtension("EXT_color_buffer_float"))
        fail(
          "float テクスチャ非対応のため動作できません(EXT_color_buffer_float)。デスクトップブラウザでお試しください。",
        );
      gl.getExtension("OES_texture_float_linear");

      function mkShader(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
          throw new Error(gl.getShaderInfoLog(s) + "\n" + src);
        return s;
      }
      function mkProg(vs, fs) {
        const p = gl.createProgram();
        gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
        gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(p);
        if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
        return p;
      }
      function uniLoc(p) {
        const m = {};
        const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
        for (let i = 0; i < n; i++) {
          const u = gl.getActiveUniform(p, i);
          m[u.name] = gl.getUniformLocation(p, u.name);
        }
        return m;
      }

      const QUAD_VS = `#version 300 es
layout(location=0) in vec2 a;
out vec2 v_uv;
void main(){v_uv=a*.5+.5;gl_Position=vec4(a,0.,1.);}`;

      const quadVAO = gl.createVertexArray();
      gl.bindVertexArray(quadVAO);
      const qb = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, qb);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
      const emptyVAO = gl.createVertexArray(); // attributeless point drawing用

      /* ---- sizes ---- */
      const AG = 512; // 512x512 = 262,144 agents
      const TR = 1024; // trail texture (square)

      /* ---- textures / fbos ---- */
      function mkTex(w, h, internal, format, type, filter, wrap) {
        const t = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, t);
        gl.texImage2D(gl.TEXTURE_2D, 0, internal, w, h, 0, format, type, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, wrap);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, wrap);
        return t;
      }
      function mkFbo(tex) {
        const f = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, f);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
        if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE)
          fail("framebuffer incomplete");
        return f;
      }
      let posA = mkTex(AG, AG, gl.RGBA32F, gl.RGBA, gl.FLOAT, gl.NEAREST, gl.CLAMP_TO_EDGE);
      let posB = mkTex(AG, AG, gl.RGBA32F, gl.RGBA, gl.FLOAT, gl.NEAREST, gl.CLAMP_TO_EDGE);
      let posFA = mkFbo(posA),
        posFB = mkFbo(posB);
      let trA = mkTex(TR, TR, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR, gl.REPEAT);
      let trB = mkTex(TR, TR, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR, gl.REPEAT);
      let trFA = mkFbo(trA),
        trFB = mkFbo(trB);

      function seedAgents() {
        const d = new Float32Array(AG * AG * 4);
        for (let i = 0; i < AG * AG; i++) {
          // 中心付近のリングから放つと立ち上がりが綺麗
          const a = Math.random() * Math.PI * 2,
            r = 0.12 + Math.random() * 0.22;
          d[i * 4] = 0.5 + Math.cos(a) * r;
          d[i * 4 + 1] = 0.5 + Math.sin(a) * r;
          d[i * 4 + 2] = a + Math.PI * (Math.random() < 0.5 ? 0 : 1);
          d[i * 4 + 3] = Math.random();
        }
        gl.bindTexture(gl.TEXTURE_2D, posA);
        gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, AG, AG, gl.RGBA, gl.FLOAT, d);
        gl.bindFramebuffer(gl.FRAMEBUFFER, trFA);
        gl.viewport(0, 0, TR, TR);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.bindFramebuffer(gl.FRAMEBUFFER, trFB);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }

      /* ---- shaders ---- */
      const UPDATE_FS = `#version 300 es
precision highp float;
uniform sampler2D u_pos,u_trail;
uniform float u_dt,u_time,u_speed,u_sensAng,u_sensDist,u_turn,u_scatter;
in vec2 v_uv; out vec4 o;
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float sense(vec2 p,float a){
  vec2 s=p+vec2(cos(a),sin(a))*u_sensDist;
  return texture(u_trail,fract(s)).r;
}
void main(){
  vec4 d=texture(u_pos,v_uv);
  vec2 p=d.xy; float ang=d.z, sd=d.w;
  float F=sense(p,ang);
  float L=sense(p,ang+u_sensAng);
  float R=sense(p,ang-u_sensAng);
  float rnd=hash(v_uv+fract(u_time*.731));
  float ts=u_turn*u_dt*60.;
  if(F>L&&F>R){ /* keep heading */ }
  else if(F<L&&F<R){ ang+=(rnd-.5)*2.*ts; }
  else if(L>R){ ang+=ts*(.7+.6*rnd); }
  else { ang-=ts*(.7+.6*rnd); }
  // beat scatter: 一部のエージェントが進行方向を失う
  if(rnd<u_scatter) ang=(rnd*7.13+sd)*6.28318;
  p+=vec2(cos(ang),sin(ang))*u_speed*u_dt;
  p=fract(p);
  o=vec4(p,ang,sd);
}`;

      const DEPOSIT_VS = `#version 300 es
uniform sampler2D u_pos;
out float v_sd;
void main(){
  ivec2 ts=textureSize(u_pos,0);
  ivec2 c=ivec2(gl_VertexID%ts.x, gl_VertexID/ts.x);
  vec4 d=texelFetch(u_pos,c,0);
  v_sd=d.w;
  gl_Position=vec4(d.xy*2.-1.,0.,1.);
  gl_PointSize=1.;
}`;
      const DEPOSIT_FS = `#version 300 es
precision highp float;
uniform float u_dep;
in float v_sd; out vec4 o;
void main(){ o=vec4(u_dep,u_dep*v_sd,0.,1.); }`;

      const DIFFUSE_FS = `#version 300 es
precision highp float;
uniform sampler2D u_trail;
uniform float u_decay,u_diff;
uniform vec2 u_px;
in vec2 v_uv; out vec4 o;
void main(){
  vec2 c=texture(u_trail,v_uv).rg;
  vec2 s=vec2(0.);
  for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++)
    s+=texture(u_trail,v_uv+vec2(float(i),float(j))*u_px).rg;
  s/=9.;
  o=vec4(mix(c,s,u_diff)*u_decay,0.,1.);
}`;

      const DISPLAY_FS = `#version 300 es
precision highp float;
uniform sampler2D u_trail;
uniform float u_gain,u_beat,u_time;
uniform vec3 u_palC,u_palD;
in vec2 v_uv; out vec4 o;
vec3 pal(float t){return .5+.5*cos(6.28318*(u_palC*t+u_palD));}
void main(){
  vec2 tr=texture(u_trail,v_uv).rg;
  float v=tr.r*u_gain;
  float hueVar=tr.g/max(tr.r,1e-4);   // エージェント個体差による色むら
  v=pow(clamp(v,0.,4.),.8);
  vec3 col=pal(v*.55+hueVar*.25+u_time*.008)*smoothstep(0.,.9,v);
  col+=vec3(.9,1.,.85)*pow(clamp(v-1.1,0.,3.),2.)*.25;   // 高密度コアの白飛び
  col*=1.+u_beat*.18;
  vec2 d=v_uv-.5; col*=1.-dot(d,d)*.7;
  o=vec4(pow(col,vec3(.9)),1.);
}`;

      const updateProg = mkProg(QUAD_VS, UPDATE_FS);
      const depositProg = mkProg(DEPOSIT_VS, DEPOSIT_FS);
      const diffuseProg = mkProg(QUAD_VS, DIFFUSE_FS);
      const displayProg = mkProg(QUAD_VS, DISPLAY_FS);
      const uU = uniLoc(updateProg),
        pU = uniLoc(depositProg),
        dU = uniLoc(diffuseProg),
        sU = uniLoc(displayProg);

      function resize() {
        const dpr = Math.min(devicePixelRatio || 1, 2);
        cv.width = innerWidth * dpr;
        cv.height = innerHeight * dpr;
      }
      addEventListener("resize", resize);
      resize();
      seedAgents();

      /* ================= MODES(noveltyで切替) ================= */
      const MODES = [
        // sensorDist(uv単位), turn, diffuse, decay, palette
        {
          sd: 9 / 1024,
          turn: 0.22,
          diff: 0.55,
          decay: 0.962,
          palC: [1, 1, 1],
          palD: [0.3, 0.45, 0.1],
        }, // 細い網目
        {
          sd: 26 / 1024,
          turn: 0.38,
          diff: 0.3,
          decay: 0.945,
          palC: [1, 0.6, 0.3],
          palD: [0.0, 0.2, 0.45],
        }, // 太い動脈
        {
          sd: 5 / 1024,
          turn: 0.55,
          diff: 0.7,
          decay: 0.975,
          palC: [2, 1, 0.5],
          palD: [0.55, 0.3, 0.2],
        }, // 霧状・カオス
        {
          sd: 16 / 1024,
          turn: 0.15,
          diff: 0.45,
          decay: 0.955,
          palC: [0.7, 0.8, 1],
          palD: [0.65, 0.55, 0.45],
        }, // 幾何学的回廊
      ];
      let modeIdx = 0,
        lastSwitch = 0;
      const cur = {
        sd: MODES[0].sd,
        turn: MODES[0].turn,
        diff: MODES[0].diff,
        decay: MODES[0].decay,
        palC: [...MODES[0].palC],
        palD: [...MODES[0].palD],
      };
      function nextMode(t) {
        modeIdx = (modeIdx + 1) % MODES.length;
        lastSwitch = t;
      }

      /* ================= LOOP ================= */
      const audio = new AudioEngine();
      let lastT = performance.now() / 1000,
        started = false,
        scatter = 0;
      const hud = {
        bpm: document.getElementById("hBpm"),
        mode: document.getElementById("hMode"),
        chg: document.getElementById("hChg"),
      };

      function frame() {
        requestAnimationFrame(frame);
        const t = performance.now() / 1000;
        const dt = Math.min(0.05, t - lastT);
        lastT = t;
        audio.update(dt);
        const A = audio;

        if (A.running && A.novelty > 2.1 && t - lastSwitch > 3.0) nextMode(t);
        const M = MODES[modeIdx],
          lk = 1 - Math.exp(-dt * 1.6);
        cur.sd += (M.sd - cur.sd) * lk;
        cur.turn += (M.turn - cur.turn) * lk;
        cur.diff += (M.diff - cur.diff) * lk;
        cur.decay += (M.decay - cur.decay) * lk;
        for (let i = 0; i < 3; i++) {
          cur.palC[i] += (M.palC[i] - cur.palC[i]) * lk;
          cur.palD[i] += (M.palD[i] - cur.palD[i]) * lk;
        }

        if (A.beat) scatter = 0.1 + A.change * 0.25; // キックで散乱(変化量に応じて強く)
        scatter *= Math.exp(-dt * 9);

        const speed = (0.05 + A.bass * 0.22) * (0.6 + A.change * 0.8); // uv/sec
        const sensAng = 0.35 + A.high * 1.1;
        const deposit = 0.1 + A.bass * 0.3;

        gl.disable(gl.BLEND);

        /* 1) update agents */
        gl.bindFramebuffer(gl.FRAMEBUFFER, posFB);
        gl.viewport(0, 0, AG, AG);
        gl.useProgram(updateProg);
        gl.bindVertexArray(quadVAO);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, posA);
        gl.uniform1i(uU.u_pos, 0);
        gl.activeTexture(gl.TEXTURE1);
        gl.bindTexture(gl.TEXTURE_2D, trA);
        gl.uniform1i(uU.u_trail, 1);
        gl.uniform1f(uU.u_dt, dt);
        gl.uniform1f(uU.u_time, t);
        gl.uniform1f(uU.u_speed, speed);
        gl.uniform1f(uU.u_sensAng, sensAng);
        gl.uniform1f(uU.u_sensDist, cur.sd);
        gl.uniform1f(uU.u_turn, cur.turn);
        gl.uniform1f(uU.u_scatter, scatter);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        [posA, posB] = [posB, posA];
        [posFA, posFB] = [posFB, posFA];

        /* 2) deposit (additive points into trail) */
        gl.bindFramebuffer(gl.FRAMEBUFFER, trFA);
        gl.viewport(0, 0, TR, TR);
        gl.useProgram(depositProg);
        gl.bindVertexArray(emptyVAO);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, posA);
        gl.uniform1i(pU.u_pos, 0);
        gl.uniform1f(pU.u_dep, deposit);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.ONE, gl.ONE);
        gl.drawArrays(gl.POINTS, 0, AG * AG);
        gl.disable(gl.BLEND);

        /* 3) diffuse + decay */
        gl.bindFramebuffer(gl.FRAMEBUFFER, trFB);
        gl.viewport(0, 0, TR, TR);
        gl.useProgram(diffuseProg);
        gl.bindVertexArray(quadVAO);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, trA);
        gl.uniform1i(dU.u_trail, 0);
        gl.uniform1f(dU.u_decay, cur.decay);
        gl.uniform1f(dU.u_diff, cur.diff);
        gl.uniform2f(dU.u_px, 1 / TR, 1 / TR);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        [trA, trB] = [trB, trA];
        [trFA, trFB] = [trFB, trFA];

        /* 4) display */
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, cv.width, cv.height);
        gl.useProgram(displayProg);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, trA);
        gl.uniform1i(sU.u_trail, 0);
        gl.uniform1f(sU.u_gain, 1.4);
        gl.uniform1f(sU.u_beat, A.beatPulse);
        gl.uniform1f(sU.u_time, t);
        gl.uniform3fv(sU.u_palC, cur.palC);
        gl.uniform3fv(sU.u_palD, cur.palD);
        gl.drawArrays(gl.TRIANGLES, 0, 3);

        if ((frame.n = (frame.n || 0) + 1) % 6 === 0) {
          hud.bpm.textContent = A.bpm || "--";
          hud.mode.textContent = modeIdx;
          hud.chg.textContent = A.change.toFixed(2);
        }
      }

      /* ================= UI ================= */
      const overlay = document.getElementById("overlay"),
        hudEl = document.getElementById("hud");
      function begin() {
        overlay.style.display = "none";
        hudEl.classList.remove("hidden");
        if (!started) {
          started = true;
          requestAnimationFrame(frame);
        }
      }
      document.getElementById("bMic").onclick = async () => {
        try {
          await audio.initMic();
          begin();
        } catch (e) {
          alert(
            "マイクにアクセスできませんでした(プレビュー環境ではブロックされることがあります)。デモ音源をお試しください。",
          );
        }
      };
      document.getElementById("bDemo").onclick = () => {
        audio.initDemo();
        begin();
      };
      addEventListener("keydown", (e) => {
        if (e.key === "s" || e.key === "S") nextMode(performance.now() / 1000);
        if (e.key === "r" || e.key === "R") seedAgents();
        if (e.key === "f" || e.key === "F")
          document.fullscreenElement
            ? document.exitFullscreen()
            : document.documentElement.requestFullscreen();
        if (e.key === "h" || e.key === "H") hudEl.classList.toggle("hidden");
      });
      let idleTimer;
      addEventListener("mousemove", () => {
        hudEl.classList.remove("hidden");
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => hudEl.classList.add("hidden"), 3500);
      });
    </script>
  </body>
</html>
